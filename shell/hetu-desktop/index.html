<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hetu</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB",
          "Microsoft YaHei", sans-serif;
        background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
        color: #f9fafb;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        -webkit-user-select: none;
      }
      .card {
        text-align: center;
        padding: 32px 40px;
      }
      .brand {
        font-size: 32px;
        font-weight: 600;
        letter-spacing: 4px;
        margin-bottom: 8px;
        background: linear-gradient(90deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .tagline {
        font-size: 13px;
        color: #9ca3af;
        margin-bottom: 28px;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.16);
        border-top-color: #93c5fd;
        animation: spin 0.9s linear infinite;
        margin: 0 auto 16px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .status {
        font-size: 12px;
        color: #9ca3af;
        min-height: 18px;
      }
      .status.error {
        color: #fca5a5;
        white-space: pre-line;
        max-width: 320px;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="spinner" id="spinner"></div>
      <div class="brand">Hetu</div>
      <div class="tagline">AI 增强知识管理</div>
      <div class="status" id="status">正在启动后端服务…</div>
    </div>
    <script type="module">
      const status = document.getElementById('status');
      const spinner = document.getElementById('spinner');

      async function bind() {
        try {
          const { listen } = await import('@tauri-apps/api/event');
          await listen('backend-ready', () => {
            status.textContent = '就绪，正在加载界面…';
          });
          await listen('backend-error', (evt) => {
            spinner.style.display = 'none';
            status.classList.add('error');
            status.textContent = '启动失败：\n' + (evt.payload ?? '未知错误');
          });
        } catch (err) {
          console.warn('event listen failed:', err);
        }
      }
      bind();
    </script>
  </body>
</html>
